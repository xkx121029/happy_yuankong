version: '3.8'

services:
  signaling-server:
    build: .
    container_name: p2p-signaling-server
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/info"]
      interval: 30s
      timeout: 10s
      retries: 3